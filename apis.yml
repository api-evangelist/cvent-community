aid: cvent-community
name: Cvent Community
kind: company
description: >-
  Cvent Community is Cvent's customer support, knowledge base,
  certification, and peer-to-peer forum hub at community.cvent.com. It
  is the 24/7 destination where event professionals learn Cvent
  products, search the Knowledge Base, take Cvent Academy training and
  certification courses, and exchange best practices with other users
  through Open Forum and product-specific learning centers (Attendee
  Hub, Registration, OnArrival, Surveys, Cvent Supplier Network, Event
  Diagramming, Cvent Studio, Cvent Webinar, Passkey). Cvent Community
  is not itself an API product; programmatic access to Cvent data is
  delivered via the Cvent Platform REST API at
  api-platform.cvent.com using OAuth 2.0 client credentials.
